<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
			<title>Pixel Maze + Joystick + Solver + Speed</title>
			<style>
				body { background:#222; color:white; font-family:Arial; text-align:center; }
				canvas { border:2px solid white; background:black; margin-top:20px; outline:none; }
				input { padding:5px; margin:5px; width:80px; }
				button { padding:10px 20px; font-size:16px; margin:10px; }
				#speedValue { font-weight:bold; }
			</style>
		</head>
	<body>

		<h2>Pixel Maze + Joystick + Green Solver Trace</h2>

		Maze Width: <input id="mw" type="number" value="241">
			Maze Height: <input id="mh" type="number" value="241">
				<button onclick="generateMaze()">Generate Maze</button>
				<button onclick="solveImageMaze()">Solve Maze</button>

				<br>
					<br>

						Speed:
						<input type="range" id="speedSlider" min="1" max="20" value="5" oninput="updateSpeed()">
							<span id="speedValue">5</span>

							<br>
								<br>

									Solve Time: <span id="solveTime">0 ms</span>

									<br>

										<canvas id="view" width="700" height="700" tabindex="0"></canvas>

										<script>
											// ======================================================
											// TRUE PIXEL-BASED MAZE GENERATOR (REAL WALLS)
											// ======================================================
											function createMaze(w, h) {
											if (w < 3) w = 3;
    if (h < 3) h = 3;

    const maze = [];
    for (let y = 0; y < h; y++) {
        maze[y] = [];
        for (let x = 0; x < w; x++) maze[y][x] = 1; // 1 = wall
    }

    // Pick random odd start cell
    let sx = (Math.floor(Math.random() * (w/2)) * 2) | 1;
    let sy = (Math.floor(Math.random() * (h/2)) * 2) | 1;

    maze[sy][sx] = 0;

    const stack = [{x:sx, y:sy}];

    const dirs = [
        {dx: 2, dy: 0},
        {dx:-2, dy: 0},
        {dx: 0, dy: 2},
        {dx: 0, dy:-2}
    ];

    while (stack.length > 0) {
        const cell = stack[stack.length - 1];
        const shuffled = dirs.sort(() => Math.random() - 0.5);

        let carved = false;

        for (const d of shuffled) {
            const nx = cell.x + d.dx;
            const ny = cell.y + d.dy;

            if (nx > 0 && nx < w-1 && ny > 0 && ny < h-1 && maze[ny][nx] === 1) {
											maze[cell.y + d.dy/2][cell.x + d.dx/2] = 0;
											maze[ny][nx] = 0;

											stack.push({x:nx, y:ny});
											carved = true;
											break;
											}
											}

											if (!carved) stack.pop();
											}

											return maze;
											}

											// ======================================================
											// FIND NEAREST FREE PIXEL TO A CORNER
											// ======================================================
											function findNearestFree(maze, sx, sy) {
											const h = maze.length;
											const w = maze[0].length;
											const q = [{x:sx, y:sy}];
											const seen = new Set([sx + "_" + sy]);
											const dirs = [[1,0],[-1,0],[0,1],[0,-1]];

											while (q.length) {
											const {x,y} = q.shift();
											if (x>=0 && x<w && y>=0 && y<h && maze[y][x] === 0) return {x,y};
											for (const [dx,dy] of dirs) {
											const nx = x+dx, ny = y+dy;
											const k = nx+"_"+ny;
											if (nx>=0 && nx<w && ny>=0 && ny<h && !seen.has(k)) {
											seen.add(k);
											q.push({x:nx,y:ny});
											}
											}
											}
											return {x:sx,y:sy};
											}

											// ======================================================
											// GLOBALS
											// ======================================================
											let maze = null;
											let mazeCanvas = document.createElement("canvas");
											let mazeCtx = mazeCanvas.getContext("2d");

											const view = document.getElementById("view");
											const ctx = view.getContext("2d");
											view.focus();

											let hPos = 1;
											let b = 5;
											let A = 1, B = 1, C = 1, D = 1;

											let baseSpeed = 0.05;
											let speedMultiplier = 5;

											let joyX = 0, joyY = 0;

											let exitX = 0, exitY = 0;

											let solving = false;
											let pixelPath = [];

											let solveStartTime = 0;

											// ======================================================
											// SPEED SLIDER
											// ======================================================
											function updateSpeed() {
											speedMultiplier = parseInt(document.getElementById("speedSlider").value);
											document.getElementById("speedValue").textContent = speedMultiplier;
											}

											// ======================================================
											// KEYBOARD INPUT
											// ======================================================
											view.addEventListener("keydown", e => {
											if (e.key === "ArrowLeft"  || e.key === "a") joyX = -1;
											if (e.key === "ArrowRight" || e.key === "d") joyX =  1;
											if (e.key === "ArrowUp"    || e.key === "w") joyY = -1;
											if (e.key === "ArrowDown"  || e.key === "s") joyY =  1;
											});
											view.addEventListener("keyup", e => {
											if (["ArrowLeft","a","ArrowRight","d"].includes(e.key)) joyX = 0;
											if (["ArrowUp","w","ArrowDown","s"].includes(e.key))    joyY = 0;
											});

											// ======================================================
											// FORMULA Y (for drawing only)
											// ======================================================
											function computeY(Aval) {
											return (Aval / B) * Math.sqrt((2 * Math.abs(b) * D) / C);
											}

											// ======================================================
											// COLLISION
											// ======================================================
											function isFree(x, y) {
											const px = Math.floor(x);
											const py = Math.floor(y);
											if (!maze || py < 0 || py >= maze.length || px < 0 || px >= maze[0].length) return false;
    return maze[py][px] === 0;
}

// ======================================================
// DRAW MAZE TO OFFSCREEN CANVAS
// ======================================================
function drawMazeToCanvas(maze) {
    const rows = maze.length;
    const cols = maze[0].length;
    mazeCanvas.width = cols;
    mazeCanvas.height = rows;
    for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
            mazeCtx.fillStyle = maze[y][x] === 1 ? "black" : "white";
            mazeCtx.fillRect(x, y, 1, 1);
        }
    }
}

// ======================================================
// SHORTEST PATH SOLVER (PIXEL BFS) + GREEN TRACE
// ======================================================
function solveImageMaze() {
    if (!maze) return;

    solveStartTime = performance.now();

    const rows = mazeCanvas.height;
    const cols = mazeCanvas.width;

    const start = {
        x: Math.floor(hPos),
        y: Math.floor(computeY(A))
    };

    if (!isFree(start.x, start.y)) {
        alert("Start point is inside a wall. Move to a white pixel first.");
        return;
    }

    const goal = { x: exitX, y: exitY };

    if (!isFree(goal.x, goal.y)) {
        alert("Exit point is inside a wall. Regenerate maze.");
        return;
    }

    const queue = [start];
    const visited = new Set([start.x+"_"+start.y]);
    const parent = {};

    const dirs = [[1,0],[-1,0],[0,1],[0,-1]];

    function key(x,y){ return x+"_"+y; }

    while (queue.length > 0) {
        const cur = queue.shift();

        if (cur.x === goal.x && cur.y === goal.y) {
											let p = key(cur.x,cur.y);
											const rev = [{x:goal.x, y:goal.y}];
											while (p in parent) {
											const [px,py] = p.split("_").map(Number);
											rev.push({x:px, y:py});
											p = parent[p];
											}
											rev.reverse();

											pixelPath = rev;
											solving = true;

											mazeCtx.fillStyle = "lime";
											for (const pt of rev) mazeCtx.fillRect(pt.x, pt.y, 1, 1);

											const solveTime = performance.now() - solveStartTime;
											document.getElementById("solveTime").textContent = solveTime.toFixed(2) + " ms";

											return;
											}

											for (const [dx,dy] of dirs) {
											const nx = cur.x + dx;
											const ny = cur.y + dy;

											if (!isFree(nx, ny)) continue;

											const k = key(nx,ny);
											if (!visited.has(k)) {
											visited.add(k);
											parent[k] = key(cur.x,cur.y);
											queue.push({x:nx, y:ny});
											}
											}
											}

											alert("No path found.");
											}

											// ======================================================
											// MAIN ANIMATION LOOP
											// ======================================================
											function animate() {
											ctx.clearRect(0,0,view.width,view.height);

											if (maze) {
											if (solving && pixelPath.length > 0) {
											for (let i = 0; i < speedMultiplier && pixelPath.length > 0; i++) {
											const next = pixelPath.shift();
											hPos = next.x;
											const k = Math.sqrt((2 * Math.abs(b) * D) / C);
											A = next.y / k;
											}
											} else if (solving && pixelPath.length === 0) {
											solving = false;
											} else {
											let newH = hPos + joyX * (baseSpeed * speedMultiplier);
											let newA = A + joyY * (baseSpeed * speedMultiplier);
											let newX = newH;
											let newY = computeY(newA);
											if (isFree(newX, newY)) {
											hPos = newH;
											A = newA;
											}
											}

											ctx.drawImage(mazeCanvas, 0, 0, view.width, view.height);

											const scaleX = view.width / mazeCanvas.width;
											const scaleY = view.height / mazeCanvas.height;

											const px = hPos;
											const py = computeY(A);

											ctx.fillStyle = "red";
											ctx.beginPath();
											ctx.arc(px * scaleX, py * scaleY, 5, 0, 2*Math.PI);
											ctx.fill();

											ctx.fillStyle = "cyan";
											ctx.beginPath();
											ctx.arc(exitX * scaleX, exitY * scaleY, 6, 0, 2*Math.PI);
											ctx.fill();
											}

											requestAnimationFrame(animate);
											}

											// ======================================================
											// GENERATE MAZE
											// ======================================================
											function generateMaze() {
											const mw = parseInt(document.getElementById("mw").value);
											const mh = parseInt(document.getElementById("mh").value);

											maze = createMaze(mw, mh);
											drawMazeToCanvas(maze);

											const startFree = findNearestFree(maze, 0, 0);
											hPos = startFree.x;
											const k = Math.sqrt((2 * Math.abs(b) * D) / C);
											A = startFree.y / k;

											const exitFree = findNearestFree(maze, mw-1, mh-1);
											exitX = exitFree.x;
											exitY = exitFree.y;

											solving = false;
											pixelPath = [];

											document.getElementById("solveTime").textContent = "0 ms";

											view.focus();
											}

											updateSpeed();
											animate();
										</script>

									</body>
</html>
