<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
			<title>Maze + Joystick + Green Solver + Speed Slider</title>
			<style>
				body { background:#222; color:white; font-family:Arial; text-align:center; }
				canvas { border:2px solid white; background:black; margin-top:20px; outline:none; }
				input { padding:5px; margin:5px; width:80px; }
				button { padding:10px 20px; font-size:16px; margin:10px; }
				#speedValue { font-weight:bold; }
			</style>
		</head>
	<body>

		<h2>Maze + Joystick + Green Solver Trace</h2>

		Maze Width: <input id="mw" type="number" value="41">
			Maze Height: <input id="mh" type="number" value="41">
				<button onclick="generateMaze()">Generate Maze</button>
				<button onclick="solveImageMaze()">Solve Maze</button>
				Solve Time: <span id="solveTime">0 ms</span> <span id="speedValue">5</span>
				Speed:
				<input type="range" id="speedSlider" min="1" max="20" value="5" oninput="updateSpeed()">
				<br>

						

							<canvas id="view" width="500" height="500" tabindex="0"></canvas>
										<script>
											// ======================================================
											// RANDOM MAZE GENERATOR (DFS)
											// ======================================================
											function createMaze(w, h) {
											const maze = [];
											for (let y = 0; y < h; y++) {
        maze[y] = [];
        for (let x = 0; x < w; x++) maze[y][x] = 1;
    }

    function carve(x, y) {
        const dirs = [[1,0],[-1,0],[0,1],[0,-1]].sort(() => Math.random() - 0.5);
        maze[y][x] = 0;
        for (const [dx, dy] of dirs) {
            const nx = x + dx*2;
            const ny = y + dy*2;
            if (ny > 0 && ny < h-1 && nx > 0 && nx < w-1 && maze[ny][nx] === 1) {
											maze[y + dy][x + dx] = 0;
											carve(nx, ny);
											}
											}
											}

											carve(1,1);
											maze[h-2][w-2] = 0;
											return maze;
											}

											// ======================================================
											// GLOBALS
											// ======================================================
											let maze = null;
											let mazeCanvas = document.createElement("canvas");
											let mazeCtx = mazeCanvas.getContext("2d");

											const view = document.getElementById("view");
											const ctx = view.getContext("2d");
											view.focus();

											let hPos = 1;
											let b = 5;
											let A = 1, B = 1, C = 1, D = 1;

											let baseSpeed = 0.05;
											let speedMultiplier = 5;

											let joyX = 0, joyY = 0;

											let exitX = 0, exitY = 0;

											let solving = false;
											let pixelPath = [];

											let solveStartTime = 0;

											// ======================================================
											// SPEED SLIDER
											// ======================================================
											function updateSpeed() {
											speedMultiplier = parseInt(document.getElementById("speedSlider").value);
											document.getElementById("speedValue").textContent = speedMultiplier;
											}

											// ======================================================
											// KEYBOARD INPUT
											// ======================================================
											view.addEventListener("keydown", e => {
											if (e.key === "ArrowLeft"  || e.key === "a") joyX = -1;
											if (e.key === "ArrowRight" || e.key === "d") joyX =  1;
											if (e.key === "ArrowUp"    || e.key === "w") joyY = -1;
											if (e.key === "ArrowDown"  || e.key === "s") joyY =  1;
											});
											view.addEventListener("keyup", e => {
											if (["ArrowLeft","a","ArrowRight","d"].includes(e.key)) joyX = 0;
											if (["ArrowUp","w","ArrowDown","s"].includes(e.key))    joyY = 0;
											});

											// ======================================================
											// FORMULA Y
											// ======================================================
											function computeY(Aval) {
											return (Aval / B) * Math.sqrt((2 * Math.abs(b) * D) / C);
											}

											// ======================================================
											// PIXEL COLLISION
											// ======================================================
											function isFree(x, y) {
											const px = Math.floor(x);
											const py = Math.floor(y);
											if (px < 0 || py < 0 || px >= mazeCanvas.width || py >= mazeCanvas.height)
        return false;
    const pixel = mazeCtx.getImageData(px, py, 1, 1).data;
    return (pixel[0] + pixel[1] + pixel[2]) > 400;
}

// ======================================================
// DRAW MAZE TO OFFSCREEN
// ======================================================
function drawMazeToCanvas(maze) {
    const rows = maze.length;
    const cols = maze[0].length;
    mazeCanvas.width = cols;
    mazeCanvas.height = rows;
    for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
            mazeCtx.fillStyle = maze[y][x] === 1 ? "black" : "white";
            mazeCtx.fillRect(x, y, 1, 1);
        }
    }
}

// ======================================================
// SHORTEST-PATH IMAGE SOLVER + GREEN TRACE
// ======================================================
function solveImageMaze() {
    if (!maze) return;

    solveStartTime = performance.now();

    const rows = mazeCanvas.height;
    const cols = mazeCanvas.width;

    const start = { x: 1, y: 1 };
    const goal  = { x: cols - 2, y: rows - 2 };

    const queue = [start];
    const visited = new Set();
    const parent = {};

    function key(x,y){ return x+"_"+y; }

    visited.add(key(start.x,start.y));

    const dirs = [
        [1,0],[-1,0],[0,1],[0,-1]
    ];

    while (queue.length > 0) {
        const cur = queue.shift();

        if (cur.x === goal.x && cur.y === goal.y) {
											let p = key(cur.x,cur.y);
											const rev = [{x:goal.x, y:goal.y}];
											while (p in parent) {
											const [px,py] = p.split("_").map(Number);
											rev.push({x:px, y:py});
											p = parent[p];
											}
											rev.reverse();

											pixelPath = rev;
											solving = true;

											// Draw green trace
											mazeCtx.fillStyle = "lime";
											for (const pt of rev) {
											mazeCtx.fillRect(pt.x, pt.y, 1, 1);
											}

											// Solve time
											const solveTime = performance.now() - solveStartTime;
											document.getElementById("solveTime").textContent = solveTime.toFixed(2) + " ms";

											return;
											}

											for (const [dx,dy] of dirs) {
											const nx = cur.x + dx;
											const ny = cur.y + dy;

											if (nx < 0 || ny < 0 || nx >= cols || ny >= rows) continue;
            if (!isFree(nx, ny)) continue;

            const k = key(nx,ny);
            if (!visited.has(k)) {
                visited.add(k);
                parent[k] = key(cur.x,cur.y);
                queue.push({x:nx, y:ny});
            }
        }
    }

    alert("No path found.");
}

// ======================================================
// MAIN ANIMATION LOOP
// ======================================================
function animate() {
    ctx.clearRect(0,0,view.width,view.height);

    if (maze) {
        if (solving && pixelPath.length > 0) {
											// Move faster based on slider
											for (let i = 0; i < speedMultiplier && pixelPath.length > 0; i++) {
											const next = pixelPath.shift();
											hPos = next.x;

											const k = Math.sqrt((2 * Math.abs(b) * D) / C);
											A = next.y / k;
											}

											} else if (solving && pixelPath.length === 0) {
											solving = false;

											} else {
											let newH = hPos + joyX * (baseSpeed * speedMultiplier);
											let newA = A + joyY * (baseSpeed * speedMultiplier);
											let newX = newH;
											let newY = computeY(newA);
											if (isFree(newX, newY)) {
											hPos = newH;
											A = newA;
											}
											}

											ctx.drawImage(mazeCanvas, 0, 0, view.width, view.height);

											const scaleX = view.width / mazeCanvas.width;
											const scaleY = view.height / mazeCanvas.height;

											const px = hPos;
											const py = computeY(A);

											ctx.fillStyle = "red";
											ctx.beginPath();
											ctx.arc(px * scaleX, py * scaleY, 5, 0, 2*Math.PI);
											ctx.fill();

											ctx.fillStyle = "lime";
											ctx.beginPath();
											ctx.arc(exitX * scaleX, exitY * scaleY, 6, 0, 2*Math.PI);
											ctx.fill();
											}

											requestAnimationFrame(animate);
											}

											// ======================================================
											// GENERATE MAZE
											// ======================================================
											function generateMaze() {
											const mw = parseInt(document.getElementById("mw").value);
											const mh = parseInt(document.getElementById("mh").value);

											maze = createMaze(mw, mh);
											drawMazeToCanvas(maze);

											hPos = 1;
											A = 1;

											exitX = mazeCanvas.width - 2;
											exitY = mazeCanvas.height - 2;

											solving = false;
											pixelPath = [];

											document.getElementById("solveTime").textContent = "0 ms";

											view.focus();
											}

											animate();
										</script>

									</body>
</html>
