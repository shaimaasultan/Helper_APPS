<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>3D Cave Viewer (Babylon)</title>
		<style>
			html, body {
			width: 100%;
			height: 100%;
			margin: 0;
			overflow: hidden;
			background: #111;
			font-family: sans-serif;
			color: #eee;
			}
			#renderCanvas {
			width: 100%;
			height: 100%;
			touch-action: none;
			display: block;
			}
			#ui {
			position: fixed;
			top: 10px;
			left: 50%;
			transform: translateX(-50%);
			background: #222;
			padding: 10px 14px;
			border-radius: 8px;
			display: flex;
			gap: 10px;
			z-index: 10;
			font-size: 12px;
			align-items: center;
			}
			#ui input {
			width: 60px;
			padding: 3px;
			border-radius: 4px;
			border: none;
			text-align: center;
			}
			#ui button {
			padding: 6px 12px;
			border: none;
			border-radius: 4px;
			background: #3b82f6;
			color: white;
			cursor: pointer;
			}
		</style>
	</head>

	<body>

		<div id="ui">
			<div>
				<label>W</label>
				<input id="paramW" type="number" value="64">
			</div>
			<div>
				<label>H</label>
				<input id="paramH" type="number" value="64">
			</div>
			<div>
				<label>Fill</label>
				<input id="paramFill" type="number" step="0.01" value="0.50">
			</div>
			<div>
				<label>Smooth</label>
				<input id="paramSmooth" type="number" value="6">
			</div>
			<button id="generate3d">Generate 3D Cave</button>
		</div>

		<canvas id="renderCanvas"></canvas>

		<!-- Local Babylon.js -->
		<script src="babylon.js"></script>

		<script>
			const canvas = document.getElementById("renderCanvas");
			const engine = new BABYLON.Engine(canvas, true);

			let scene, caveParent;

			function createScene() {
			scene = new BABYLON.Scene(engine);
			scene.clearColor = new BABYLON.Color3(0, 0, 0);

			const camera = new BABYLON.ArcRotateCamera(
			"camera",
			Math.PI / 3,
			Math.PI / 3,
			120,
			new BABYLON.Vector3(0, 0, 0),
			scene
			);
			camera.attachControl(canvas, true);

			const light = new BABYLON.HemisphericLight(
			"hemi",
			new BABYLON.Vector3(0, 1, 0),
			scene
			);
			light.intensity = 0.7;

			const dir = new BABYLON.DirectionalLight(
			"dir",
			new BABYLON.Vector3(-1, -2, -1),
			scene
			);
			dir.position = new BABYLON.Vector3(50, 100, 50);
			dir.intensity = 0.6;

			const ground = BABYLON.MeshBuilder.CreateGround(
			"ground",
			{ width: 500, height: 500 },
			scene
			);
			const groundMat = new BABYLON.StandardMaterial("groundMat", scene);
			groundMat.diffuseColor = new BABYLON.Color3(0.1, 0.1, 0.1);
			ground.material = groundMat;

			caveParent = new BABYLON.TransformNode("caveParent", scene);

			return scene;
			}

			/* ---------- Cave generation (same logic as before) ---------- */

			function generateCave(W, H, fillChance, smoothCount) {
			let map = [];

			for (let y = 0; y < H; y++) {
    map[y] = [];
    for (let x = 0; x < W; x++) {
      map[y][x] = Math.random() < fillChance ? 1 : 0;
    }
  }

  const targetDensity = 0.5;
  let bias = fillChance > targetDensity ? -0.15 : +0.15;

  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      if (Math.random() < Math.abs(bias)) {
        map[y][x] = bias > 0 ? 1 : 0;
      }
    }
  }

  for (let i = 0; i < smoothCount; i++) map = smooth(map, W, H);
  for (let i = 0; i < 2; i++) map = erode(map, W, H);

  return floodFillConnect(map, W, H);
}

function smooth(map, W, H) {
  const newMap = map.map(r => r.slice());
  for (let y = 1; y < H - 1; y++) {
    for (let x = 1; x < W - 1; x++) {
      let walls = 0;
      for (let yy = -1; yy <= 1; yy++)
			for (let xx = -1; xx <= 1; xx++)
			if (map[y + yy][x + xx] === 1) walls++;

			newMap[y][x] = walls >= 5 ? 1 : 0;
			}
			}
			return newMap;
			}

			function erode(map, W, H) {
			const newMap = map.map(r => r.slice());
			for (let y = 1; y < H - 1; y++) {
    for (let x = 1; x < W - 1; x++) {
      if (map[y][x] === 1) {
        let open = 0;
        for (let yy = -1; yy <= 1; yy++)
			for (let xx = -1; xx <= 1; xx++)
			if (map[y + yy][x + xx] === 0) open++;

			if (open >= 4) newMap[y][x] = 0;
			}
			}
			}
			return newMap;
			}

			function floodFillConnect(map, W, H) {
			const visited = Array.from({ length: H }, () => Array(W).fill(false));
			const regions = [];

			function flood(x, y) {
			const stack = [[x, y]];
			const cells = [];
			visited[y][x] = true;

			while (stack.length) {
			const [cx, cy] = stack.pop();
			cells.push([cx, cy]);

			const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
			for (const [dx, dy] of dirs) {
			const nx = cx + dx, ny = cy + dy;
			if (nx >= 0 && nx < W && ny >= 0 && ny < H) {
          if (!visited[ny][nx] && map[ny][nx] === 0) {
			visited[ny][nx] = true;
			stack.push([nx, ny]);
			}
			}
			}
			}
			return cells;
			}

			for (let y = 0; y < H; y++)
    for (let x = 0; x < W; x++)
      if (!visited[y][x] && map[y][x] === 0)
			regions.push(flood(x, y));

			if (regions.length === 0) return map;

			const largest = regions.sort((a, b) => b.length - a.length)[0];
			const newMap = map.map(r => r.slice());

			for (let y = 0; y < H; y++)
    for (let x = 0; x < W; x++)
      newMap[y][x] = 1;

  for (const [x, y] of largest)
    newMap[y][x] = 0;

  return newMap;
}

/* ---------- Build 3D cave in Babylon ---------- */

function buildCave3D(map, W, H) {
  // clear previous cave
  caveParent.getChildren().forEach(m => m.dispose());

  const scale = 2;
  const offsetX = -(W * scale) / 2;
  const offsetZ = -(H * scale) / 2;

  const wallMat = new BABYLON.StandardMaterial("wallMat", scene);
  wallMat.diffuseColor = new BABYLON.Color3(0.2, 0.4, 1.0);

  const baseBox = BABYLON.MeshBuilder.CreateBox(
    "wallUnit",
    { width: 2, height: 2, depth: 2 },
    scene
  );
  baseBox.isVisible = false;

  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      if (map[y][x] === 1) {
        const m = baseBox.createInstance("w_" + x + "_" + y);
        m.position.x = offsetX + x * scale;
        m.position.y = 1;
        m.position.z = offsetZ + y * scale;
        m.material = wallMat;
        m.parent = caveParent;
      }
    }
  }
}

/* ---------- UI wiring ---------- */

function regenerate() {
  const W = parseInt(document.getElementById("paramW").value);
  const H = parseInt(document.getElementById("paramH").value);
  const fillChance = parseFloat(document.getElementById("paramFill").value);
  const smoothCount = parseInt(document.getElementById("paramSmooth").value);

  const map = generateCave(W, H, fillChance, smoothCount);
  buildCave3D(map, W, H);
}

document.getElementById("generate3d").onclick = regenerate;

/* ---------- Start ---------- */

const sceneInstance = createScene();
regenerate();

engine.runRenderLoop(() => {
  sceneInstance.render();
});

window.addEventListener("resize", () => {
  engine.resize();
});
		</script>

	</body>
</html>
