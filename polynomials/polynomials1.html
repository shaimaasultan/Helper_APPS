<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Symmetric Polynomial Root Solver — Visual</title>
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial; margin: 18px; max-width:1100px; }
    h2 { margin-top: 0; }
    .controls { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:12px; align-items:center; }
    label { font-size:14px; }
    input[type="text"] { font-family: monospace; padding:6px; width:360px; }
    button { padding:8px 12px; }
    .boxed { background:#fafafa; border:1px solid #eee; padding:12px; border-radius:8px; white-space:pre-wrap; font-family: monospace; }
    .grid { display:grid; grid-template-columns: 1fr 420px; gap:12px; align-items:start; }
    table { border-collapse:collapse; width:100%; font-family: monospace; font-size:13px; }
    th, td { border:1px solid #ddd; padding:6px 8px; text-align:left; }
    th { background:#f2f2f2; }
    svg { background: #fff; border:1px solid #ddd; border-radius:6px; }
    .small { font-size:13px; color:#555; }
    .controls-row { display:flex; gap:8px; align-items:center; margin-bottom:8px; }
    .muted { color:#666; font-size:13px; }
  </style>
</head>
<body>
  <h2>Polynomial Root Finder — improved visualization</h2>

  <div class="controls">
    <div>
      <label>Coefficients (A_{n-1} ... A0) for monic x^n + ... + A0</label><br/>
      <input id="coeffsInput" value="10,35,50,24,15" />
    </div>

    <div>
      <label>Initial guess (optional, comma)</label><br/>
      <input id="guessInput" placeholder="e.g. 1,1,1,1,1" />
    </div>

    <div>
      <label>Group tol</label><br/>
      <input id="groupTol" value="1e-6" style="width:90px" />
    </div>

    <div style="align-self:end">
      <button id="runBtn">Solve & Plot</button>
      <button id="exampleBtn">Load example</button>
    </div>
  </div>

  <div class="grid">
    <div>
      <div id="output" class="boxed" style="white-space:pre-wrap;height:380px; overflow:auto ; white-space:pre-wrap"></div>
      <div style="margin-top:10px" class="muted">Tip: use the table to inspect multiplicities. Hover points in the plot for exact values.</div>
    </div>

    <div>
      <svg id="plot" width="420" height="420" viewBox="0 0 420 420"></svg>
    </div>
  </div>

<script>
/* Utilities (complex arithmetic) */
function complex(re, im=0){ return {re:+re, im:+im}; }
function cAdd(a,b){ return complex(a.re+b.re, a.im+b.im); }
function cSub(a,b){ return complex(a.re-b.re, a.im-b.im); }
function cMul(a,b){ return complex(a.re*b.re - a.im*b.im, a.re*b.im + a.im*b.re); }
function cDiv(a,b){ const d=b.re*b.re+b.im*b.im; return complex((a.re*b.re + a.im*b.im)/d, (a.im*b.re - a.re*b.im)/d); }
function cAbs(a){ return Math.hypot(a.re, a.im); }
function tolParse(v, fallback){ try{ return Number(v); }catch(e){ return fallback; } }
function fmt(z, p=6){
  if(!z) z = complex(0,0);
  const re = Math.abs(z.re) < 5e-14 ? 0 : z.re;
  const im = Math.abs(z.im) < 5e-14 ? 0 : z.im;
  if(im === 0) return re.toFixed(p);
  if(re === 0) return (im>=0? '' : '-') + Math.abs(im).toFixed(p) + 'i';
  return re.toFixed(p) + (im>=0 ? ' + ' : ' - ') + Math.abs(im).toFixed(p) + 'i';
}

/* Horner evaluate polynomial x^n + A_{n-1} x^{n-1} + ... + A0 */
function evalPolyAt(x, coeffs){
  const z = (typeof x.re === 'number')? x : complex(x,0);
  const n = coeffs.length;
  let res = complex(1,0);
  for(let i=0;i<n;i++){
    res = cMul(res, z);
    res = cAdd(res, complex(coeffs[i],0));
  }
  return res;
}

/* Durand–Kerner root finder */
function durandKerner(coeffs, maxIter=500, tol=1e-12){
  const n = coeffs.length;
  const R = 1 + Math.max(...coeffs.map(Math.abs));
  const roots = [];
  for(let k=0;k<n;k++){
    const ang = 2*Math.PI*k/n;
    roots.push(complex(R*Math.cos(ang), R*Math.sin(ang)));
  }
  for(let iter=0; iter<maxIter; iter++){
    let maxd = 0;
    for(let i=0;i<n;i++){
      const xi = roots[i];
      const pxi = evalPolyAt(xi, coeffs);
      let denom = complex(1,0);
      for(let j=0;j<n;j++) if(j!==i) denom = cMul(denom, cSub(xi, roots[j]));
      if(cAbs(denom) < 1e-18) denom = cAdd(denom, complex(1e-9,1e-9));
      const delta = cDiv(pxi, denom);
      roots[i] = cSub(xi, delta);
      maxd = Math.max(maxd, cAbs(delta));
    }
    if(maxd < tol) break;
  }
  return roots;
}

/* Group near-duplicates by magnitude/distance */
function groupRoots(roots, tol){
  const used = new Array(roots.length).fill(false);
  const groups = [];
  for(let i=0;i<roots.length;i++){
    if(used[i]) continue;
    const g = [roots[i]];
    used[i]=true;
    for(let j=i+1;j<roots.length;j++){
      if(used[j]) continue;
      if(cAbs(cSub(roots[i], roots[j])) <= tol){ g.push(roots[j]); used[j]=true; }
    }
    groups.push(g);
  }
  return groups;
}

/* UI helpers */
const out = document.getElementById('output');
const svg = document.getElementById('plot');
const runBtn = document.getElementById('runBtn');
const coeffsInput = document.getElementById('coeffsInput');
const guessInput = document.getElementById('guessInput');
const groupTolInput = document.getElementById('groupTol');
const exampleBtn = document.getElementById('exampleBtn');

exampleBtn.onclick = ()=> { coeffsInput.value = "10,35,50,24,15"; guessInput.value=""; groupTolInput.value="1e-6"; };

function clearOut(){ out.textContent=''; svg.innerHTML=''; }
function appendLn(s){ out.textContent += s + "\\n"; }

function makeTable(groups, coeffs){
  let html = "<table><thead><tr><th>#</th><th>Representative</th><th>Multiplicity</th><th>Members (mag)</th><th>Verification</th></tr></thead><tbody>";
  for(let i=0;i<groups.length;i++){
    const g = groups[i];
    const rep = g[0];
    const mult = g.length;
    const members = g.map(r=> fmt(r,6) + " ("+ cAbs(r).toFixed(6) +")").join("<br/>");
    // verification: evaluate polynomial at x = -rep
    const x = complex(-rep.re, -rep.im);
    const val = evalPolyAt(x, coeffs);
    html += `<tr><td>${i+1}</td><td>${fmt(rep,6)}</td><td>${mult}</td><td>${members}</td><td>${fmt(val,8)}</td></tr>`;
  }
  html += "</tbody></table>";
  return html;
}

function plotRoots(roots){
  const W = svg.clientWidth, H = svg.clientHeight;
  svg.innerHTML = ""; // clear
  // compute extents
  let xs = roots.map(r=>r.re), ys = roots.map(r=>r.im);
  const pad = 0.12;
  const xmin = Math.min(...xs), xmax = Math.max(...xs);
  const ymin = Math.min(...ys), ymax = Math.max(...ys);
  const dx = (xmax - xmin) || 1;
  const dy = (ymax - ymin) || 1;
  const xpad = dx * pad, ypad = dy * pad;
  const left = xmin - xpad, right = xmax + xpad, top = ymax + ypad, bottom = ymin - ypad;
  function toPxX(x){ return 20 + ( (x - left) / (right - left) ) * (W-40); }
  function toPxY(y){ return 20 + (1 - ( (y - bottom) / (top - bottom) )) * (H-40); }

  // axes
  const axisColor = "#888";
  const ns = (tag)=>document.createElementNS("http://www.w3.org/2000/svg", tag);
  // grid lines
  const gx = ns('g'); svg.appendChild(gx);
  // x=0
  if(left <= 0 && right >= 0){
    const x0 = toPxX(0);
    const line = ns('line'); line.setAttribute('x1', x0); line.setAttribute('x2', x0); line.setAttribute('y1', 10); line.setAttribute('y2', H-10);
    line.setAttribute('stroke', axisColor); line.setAttribute('stroke-width', 1); line.setAttribute('opacity', 0.7);
    svg.appendChild(line);
  }
  // y=0
  if(bottom <= 0 && top >= 0){
    const y0 = toPxY(0);
    const line = ns('line'); line.setAttribute('x1', 10); line.setAttribute('x2', W-10); line.setAttribute('y1', y0); line.setAttribute('y2', y0);
    line.setAttribute('stroke', axisColor); line.setAttribute('stroke-width', 1); line.setAttribute('opacity', 0.7);
    svg.appendChild(line);
  }

  // points with hover
  roots.forEach((r, idx)=>{
    const cx = toPxX(r.re), cy = toPxY(r.im);
    const g = ns('g');
    const circle = ns('circle');
    circle.setAttribute('cx', cx); circle.setAttribute('cy', cy); circle.setAttribute('r', 6);
    circle.setAttribute('fill', '#1976d2'); circle.setAttribute('stroke', '#08306a'); circle.setAttribute('stroke-width', 0.8);
    g.appendChild(circle);
    // label
    const lbl = ns('text');
    lbl.setAttribute('x', cx + 8); lbl.setAttribute('y', cy - 8); lbl.setAttribute('font-size', 11); lbl.setAttribute('fill', '#222');
    lbl.textContent = fmt(r,4);
    g.appendChild(lbl);
    // tooltip via title
    const title = ns('title'); title.textContent = `root ${idx+1}\\n${fmt(r,8)}\\n|r|=${cAbs(r).toFixed(8)}`; g.appendChild(title);
    svg.appendChild(g);
  });

  // border
  const rect = ns('rect'); rect.setAttribute('x', 0); rect.setAttribute('y', 0); rect.setAttribute('width', W); rect.setAttribute('height', H);
  rect.setAttribute('fill', 'none'); rect.setAttribute('stroke', '#ddd'); rect.setAttribute('stroke-width', 1);
  svg.appendChild(rect);
}

/* Orchestration */
runBtn.onclick = ()=>{
  clearOut();
  const raw = coeffsInput.value.trim();
  if(!raw){ appendLn("Enter coefficients."); return; }
  const coeffs = raw.split(',').map(s=>+s.trim()).filter(v=>!isNaN(v));
  const n = coeffs.length;
  appendLn("Polynomial: x^" + n + " + " + coeffs.map((c,i)=> `${c}*x^${n-1-i}`).join(" + "));
  appendLn("");

  // Newton symmetric solver was in previous iteration; we keep Durand–Kerner as reliable path.
  appendLn("Running Durand–Kerner (robust all-complex roots)...");
  const roots = durandKerner(coeffs, 400, 1e-12);
  appendLn("Found " + roots.length + " roots.");
  // sort by real then imag
  roots.sort((a,b)=> a.re - b.re || a.im - b.im);

  // grouping
  const gtol = Number(groupTolInput.value) || 1e-6;
  const groups = groupRoots(roots, gtol);

  // print table
  const tableHtml = makeTable(groups, coeffs);
  appendLn(""); // keep boxed area textual part for copy
  out.innerHTML = out.textContent + "\\n" + tableHtml;

  // also print compact listing
  appendLn("\\nCompact list (sorted):");
  roots.forEach((r,i)=> appendLn((i+1)+". " + fmt(r,8) + "  |  |r|=" + cAbs(r).toFixed(10)));

  // plot
  plotRoots(roots);
};

function appendLn(s){ out.textContent += s + "\n"; }

</script>
</body>
</html>
