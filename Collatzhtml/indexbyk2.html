<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Multi-k Collatz Flow Graph</title>
  <script src="https://unpkg.com/vis-network@10.1.0/standalone/umd/vis-network.min.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 0; }
    #controls { padding: 10px; border-bottom: 1px solid #ccc; }
    #network { width: 100vw; height: calc(100vh - 70px); }
    label { margin-right: 10px; }
    input { width: 120px; }
  </style>
</head>
<body>
  <div id="controls">
    <label>Ks (comma-separated):
      <input type="text" id="kListInput" value="1,2,3,4">
    </label>
    <label>A:
      <input type="number" id="aInput" value="1">
    </label>
    <label>B:
      <input type="number" id="bInput" value="4000">
    </label>
    <button id="buildBtn">Build multi-k graph</button>
  </div>

  <div id="network"></div>

  <script>
    const container = document.getElementById("network");
    let network = null;

    function colorForLastDigit(n) {
      const d = ((n % 10) + 10) % 10;
      if (d === 1) return "#FFD54F"; // yellow
      if (d === 3) return "#EF5350"; // red
      if (d === 5) return "#66BB6A"; // green
      if (d === 7) return "#42A5F5"; // blue
      if (d === 9) return "#AB47BC"; // purple
      return "#BDBDBD";
    }

    // Build recursive closure for a single k-layer
    function buildRecursiveKGraphForK(k, A, B, yOffset) {
      const pow2k = 2 ** k;

      const nodes = [];
      const edges = [];
      const nodeSet = new Set();

      function nodeId(n) {
        return `k${k}_n${n}`;
      }

      function addNode(n) {
        const id = nodeId(n);
        if (!nodeSet.has(id)) {
          nodeSet.add(id);
          nodes.push({
            id: id,
            label: String(n),
            color: { background: colorForLastDigit(n), border: "#333" },
            x: n * 3,
            y: yOffset,
            fixed: { x: true, y: true }
          });
          return true;
        }
        return false;
      }

      const queue = [];
      for (let m = A; m <= B; m++) {
        if (m % 2 === 1) {
          addNode(m);
          queue.push(m);
        }
      }

      while (queue.length > 0) {
        const m = queue.shift();

        const N = m * pow2k - 1;
        if (N % 3 !== 0) continue;

        const n = N / 3;
        if (!Number.isInteger(n) || n % 2 === 0) continue;
        if (n < A || n > B) continue;

        const isNew = addNode(n);

        edges.push({
          from: nodeId(m),
          to: nodeId(n),
          label: "k=" + k,
          arrows: "to",
          font: { size: 10 }
        });

        if (isNew) queue.push(n);
      }

      return { nodes, edges };
    }

    function render() {
      const kListStr = document.getElementById("kListInput").value;
      const A = parseInt(document.getElementById("aInput").value);
      const B = parseInt(document.getElementById("bInput").value);

      const kValues = kListStr
        .split(",")
        .map(s => parseInt(s.trim()))
        .filter(x => !isNaN(x));

      const allNodes = [];
      const allEdges = [];

      const layerGap = 250;

      const layerData = [];

      // Build each k-layer
      kValues.forEach((k, idx) => {
        const yOffset = idx * layerGap;
        const { nodes, edges } = buildRecursiveKGraphForK(k, A, B, yOffset);
        layerData.push({ k, nodes, edges });
        allNodes.push(...nodes);
        allEdges.push(...edges);
      });

      // Add bidirectional cross-layer edges
      for (let i = 0; i < kValues.length - 1; i++) {
        const k = kValues[i];
        const nextK = kValues[i + 1];
        const pow2next = 2 ** nextK;

        for (let n = A; n <= B; n++) {
          if (n % 2 === 0) continue;

          const N2 = n * pow2next - 1;
          if (N2 % 3 !== 0) continue;

          const n2 = N2 / 3;
          if (!Number.isInteger(n2) || n2 % 2 === 0) continue;
          if (n2 < A || n2 > B) continue;

          const id1 = `k${k}_n${n}`;
          const id2 = `k${nextK}_n${n2}`;

          allEdges.push({
            from: id1,
            to: id2,
            label: "k→k+1",
            arrows: "to",
            color: { color: "#000" },
            font: { size: 10 }
          });

          allEdges.push({
            from: id2,
            to: id1,
            label: "k+1→k",
            arrows: "to",
            color: { color: "#444" },
            font: { size: 10 }
          });
        }
      }

      const data = {
        nodes: new vis.DataSet(allNodes),
        edges: new vis.DataSet(allEdges)
      };

      const options = {
        physics: { enabled: false },
        nodes: {
          shape: "dot",
          size: 16,
          font: { size: 14 }
        },
        edges: {
          arrows: "to",
          smooth: false
        }
      };

      if (network) network.destroy();
      network = new vis.Network(container, data, options);
    }

    document.getElementById("buildBtn").addEventListener("click", render);
    render();
  </script>
</body>
</html>
