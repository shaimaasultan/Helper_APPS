<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
			<title>Robot Navigation on 2D Map</title>
			<style>
				body { background:#222; color:white; font-family:Arial; text-align:center; }
				canvas { border:2px solid white; background:black; margin-top:20px; outline:none; }
				input { padding:5px; margin:5px; width:80px; }
				button { padding:10px 20px; font-size:16px; margin:10px; }
				#speedValue { font-weight:bold; }
			</style>
		</head>
	<body>

		<h2>Robot Navigation on 2D Map (BFS Shortest Path)</h2>

		Map Width: <input id="mw" type="number" value="241">
			Map Height: <input id="mh" type="number" value="241">
				<button onclick="generateMap()">Generate Map</button>
				<button onclick="solveRobotPath()">Plan Path</button>

				<br>
					<br>

						Speed:
						<input type="range" id="speedSlider" min="1" max="20" value="5" oninput="updateSpeed()">
							<span id="speedValue">5</span>

							<br>
								<br>

									Solve Time: <span id="solveTime">0 ms</span>

									<br>
										<small>Click on the map to set the target position.</small>
										<br>

											<canvas id="view" width="700" height="700" tabindex="0"></canvas>

											<script src="robot.js"></script>
										</body>
</html>
